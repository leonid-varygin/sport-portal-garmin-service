# Автоматический деплой Garmin Service на продакшен
# Запускается при пуше в ветку master/main
# Использует Tailscale для SSH (обходит роутер/sing-box)
#
# Требуемые секреты в GitHub (Settings → Secrets → Actions):
#   TS_AUTHKEY            — Tailscale auth key (https://login.tailscale.com/admin/settings/keys)
#   TAILSCALE_SERVER_HOST — 100.122.8.89
#   SERVER_USER           — lvar
#   SSH_PRIVATE_KEY       — приватный SSH ключ

name: Deploy Garmin Service

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled --state=mem: --tun=userspace-networking --socks5-server=localhost:1055 &
          sleep 3
          sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }} --accept-routes

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy Garmin Service to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.TAILSCALE_SERVER_HOST }} "/home/lvar/sport-portal/scripts/deploy-garmin.sh"