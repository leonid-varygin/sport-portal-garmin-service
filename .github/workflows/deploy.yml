# Автоматический деплой Garmin Service на продакшен
# Запускается при пуше в ветку master/main
# Использует Tailscale для SSH (обходит роутер/sing-box)

name: Deploy Garmin Service

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # Ручной запуск

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.TAILSCALE_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy Garmin Service to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.TAILSCALE_SERVER_HOST }} "cd /home/lvar/sport-portal/garmin-service && git fetch --all && git reset --hard origin/master && cd /home/lvar/sport-portal && chmod +x scripts/deploy-garmin.sh && ./scripts/deploy-garmin.sh"